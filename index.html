<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goose Lennon - Captive Portal</title>
    <link rel="icon" type="image/png" href="/images/GL (4).png">
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            background-color: #a2bec9;
            background-image: url('4681837444_613d526ec5_b.jpg');
            background-size: cover;
            background-repeat: no-repeat;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        input, button {
            padding: 10px;
            margin: 10px 0;
            width: 80%;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
        }
        button {
            background-color: #a2bec9;
            color: black;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #d0e0e3;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Enter your referral code</h2>
    <form onsubmit="redirectToUrl(event)">
        <input type="text" id="code">
        <button type="submit">Continue</button>
    </form>
</div>
<script>
    function redirectToUrl(event) {
        event.preventDefault();
        const referralCode = document.getElementById("code").value;
        async function hashString(message) {
            const msgUint8 = new TextEncoder().encode(message); 
            const hashBuffer = await crypto.subtle.digest("SHA-256", msgUint8); 
            const hashArray = Array.from(new Uint8Array(hashBuffer)); 
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join(''); 
            return hashHex;
        }
        async function run() {
            const hash = await hashString(referralCode);
            if (hash === "0f8eb4b72b6e0c9e88b388eb967b49e067ef1004bf07bffc22c3acb13b43580a") {
                window.location.href = "https://sites.google.com/view/gooselennon/captivePortalSuccess";
            } else {
                window.location.href = "https://sites.google.com/view/gooselennon/captivePortalFailure";
            }
        }
        run();
    }
</script>
</body>
</html>
